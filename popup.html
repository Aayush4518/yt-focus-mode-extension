<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Focus Mode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>YouTube Focus Mode</h1>
    
    <div class="input-group">
      <label for="minutes">Focus Duration (minutes)</label>
      <input type="number" id="minutes" min="1" max="180" value="25">
    </div>
    
    <button id="startBtn" class="btn primary">Start Focus</button>
    
    <div class="timer" id="timerDisplay" style="display: none;">
      <span class="timer-label">Time Remaining</span>
      <span class="timer-value" id="timeRemaining">--:--</span>
    </div>
    
    <button id="stopBtn" class="btn danger" style="display: none;">End Early</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
